<VirtualHost *:443>
    ServerName verein.nak-alstertal.de

    DocumentRoot "${NAK_FOV}production/dist"

    # Release endpoint
    Alias /release /var/www/NAKFoerdervereinAlstertal/release
    <Directory /var/www/NAKFoerdervereinAlstertal/release>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Contact form endpoint
    Alias /api/contact /var/www/NAKFoerdervereinAlstertal/api/contact
    <Directory /var/www/NAKFoerdervereinAlstertal/api/contact>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>
	<Directory "${NAK_FOV}production/dist">
		Options FollowSymLinks
        AllowOverride None
        Require all granted

	    # Rewrite-Regeln
	    RewriteEngine On
	    RewriteBase /
	    RewriteRule ^index\.html$ - [L]
	    RewriteCond %{REQUEST_FILENAME} !-f
	    RewriteCond %{REQUEST_FILENAME} !-d
	    RewriteCond %{REQUEST_FILENAME} !-l
	    RewriteCond %{REQUEST_URI} !^/release(/|$)
	    RewriteCond %{REQUEST_URI} !^/api/contact(/|$)
	    RewriteRule . /index.html [L]
	</Directory>
	ErrorLog "${LOG}NAK_FOV.nak-alstertal.de-error.log"
	CustomLog "${LOG}NAK_FOV.nak-alstertal.de-access.log" common

	SSLCertificateFile /etc/letsencrypt/live/verein.nak-alstertal.de/fullchain.pem
	SSLCertificateKeyFile /etc/letsencrypt/live/verein.nak-alstertal.de/privkey.pem
	Include /etc/letsencrypt/options-ssl-apache.conf
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://images.unsplash.com; font-src 'self'; connect-src 'self'; frame-src 'none'; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;"

    # Release-Endpoint bekommt lockere CSP (token-geschützt, kein öffentlicher Zugang)
    <Location /release>
        Header always set Content-Security-Policy "script-src 'unsafe-inline'"
    </Location>
</VirtualHost>
